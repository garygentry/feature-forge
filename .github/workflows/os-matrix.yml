# feature-forge/.github/workflows/os-matrix.yml
#
# OS-matrix installer gate (REQ-CI-07, REQ-CI-08). Exercises the cross-agent installer's
# `install --dry-run` (plan only, no writes) and `uninstall` path on Ubuntu, macOS, and Windows,
# failing the PR if the installer errors on ANY OS. Kept in its own workflow (REQ-PERF-01) so it
# stays off the fast per-PR path in ci.yml and its required-check status is tunable independently.
#
# --skip-rauf is used on every leg as a deliberate CI choice: it keeps the matrix network-free and
# scoped to the installer itself (no rauf registry preflight). rauf is published now (@garygentry/rauf),
# so this is an isolation choice, not a workaround for an unpublished dependency. See 00 §7.
name: OS Matrix (installer)

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  installer:
    name: installer dry-run + uninstall (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # REQ-CI-07: every OS must report; one OS's failure must not cancel the others
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5 # pinned to a major tag (REQ-SEC-01), mirrors rauf/ci.yml

      - name: Set up Node
        uses: actions/setup-node@v6 # pinned (REQ-SEC-01); v6 runs on node24 (clears the node20 deprecation)
        with:
          node-version: "22" # >=18 required by installer/package.json "engines"; 22 is the current LTS

      # Build the installer on this OS's toolchain. `cd installer` for npm; the run commands below
      # invoke the built entry from the REPO ROOT (the working dir GitHub Actions restores per step).
      - name: Build installer
        working-directory: installer
        run: npm ci && npm run build

      # ---- LEG 1: install --dry-run --skip-rauf --json -------------------------------------------
      # Plan only (no writes), --skip-rauf (no rauf preflight), --json for a machine-checkable report.
      # The step asserts exit 0 (the `run:` fails the job on non-zero) AND that stdout is valid JSON
      # (the node -e pipe below). On any installer error the installer's own message is on stderr and
      # surfaced in the log (REQ-OBS-01). shell: bash makes the pipe portable across all three OSes.
      - name: install --dry-run (assert exit 0 + valid JSON)
        shell: bash
        run: |
          set -euo pipefail
          node installer/dist/cli.js install --dry-run --skip-rauf --json | tee dry-run.json
          # Cross-platform JSON validation: node is guaranteed present (setup-node above), so we
          # parse with node -e rather than python/jq (which are not uniformly available on the
          # Windows runner). A parse failure exits non-zero and fails the leg.
          node -e "JSON.parse(require('node:fs').readFileSync('dry-run.json','utf8'))"

      # ---- LEG 2: uninstall -y --skip-rauf -------------------------------------------------------
      # Exercises the uninstall path. -y is non-interactive (never blocks on input); with nothing
      # installed this is an "ok, no-op" per agent (cli.ts runOneAgent uninstall branch) and exits 0.
      - name: uninstall -y --skip-rauf (assert exit 0)
        shell: bash
        run: |
          set -euo pipefail
          node installer/dist/cli.js uninstall -y --skip-rauf

      # ---- LEG 3 (Linux/macOS ONLY): --symlink --dry-run ----------------------------------------
      # REQ-CI-08: the Windows leg MUST NOT pass --symlink (copy-by-default). POSIX legs MAY exercise
      # the symlink plan path. Guarded off Windows so the matrix never asserts symlink there.
      - name: install --symlink --dry-run (POSIX only)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          node installer/dist/cli.js install --symlink --dry-run --skip-rauf --json | tee symlink-dry-run.json
          node -e "JSON.parse(require('node:fs').readFileSync('symlink-dry-run.json','utf8'))"

      # ---- LEG 4 (all OSes): global-install the package and run the REAL installed bin ------------
      # The legs above invoke `node installer/dist/cli.js` directly, which never exercises the
      # actual published entry point: the symlinked (POSIX) / `.cmd`-shimmed (Windows) bin that
      # `npm i -g` / `npx` create. That gap let a non-functional bin ship through 0.1.1–0.1.3 —
      # a missing shebang and a symlink-unaware entry guard each made the installed bin a silent
      # no-op (exit 0, EMPTY output) while the direct-node path kept working. This leg closes it:
      # it packs the installer (prepack = build + bundle adapters), global-installs the tarball into
      # an isolated prefix, puts that prefix's bin on PATH, and runs `feature-forge --version` by
      # NAME. The assertion is on the OUTPUT (non-empty semver), not just exit 0 — the regression
      # was exit 0 with no output, so an exit-code-only check would have missed it.
      - name: real-bin smoke (global-install + run installed bin, assert semver output)
        shell: bash
        run: |
          set -euo pipefail
          # Pack the installer; prepack builds dist/ + bundles adapters into the tarball.
          ( cd installer && npm pack )
          # Leading ./ forces npm to treat this as a LOCAL tarball path, not a github org/repo
          # shorthand ("installer/foo.tgz" would otherwise be parsed as a git spec and fail).
          TARBALL="./$(ls installer/*.tgz | head -n1)"
          echo "packed: $TARBALL"
          # Global-install the packed tarball into an isolated prefix (no admin, no global pollution).
          # A packed tarball does NOT re-run prepack, so the installed bin is the real built artifact.
          PREFIX="$PWD/.gprefix"
          NPM_PREFIX="$PREFIX"
          # On the Windows runner, npm needs a native path; cygpath exists only in git-bash there.
          if command -v cygpath >/dev/null 2>&1; then NPM_PREFIX="$(cygpath -w "$PREFIX")"; fi
          npm install -g --prefix "$NPM_PREFIX" "$TARBALL"
          # POSIX puts the bin in $PREFIX/bin (a symlink); Windows puts the .cmd shim in $PREFIX
          # itself. Add both so the bare-name lookup below resolves on every runner.
          export PATH="$PREFIX/bin:$PREFIX:$PATH"
          # Invoke by NAME (not by path) so we hit the symlink / .cmd shim, the real install path.
          OUT="$(feature-forge --version)"
          echo "feature-forge --version => '${OUT}'"
          # Assert NON-EMPTY semver. The no-op regression was exit 0 with empty stdout, so this
          # check — not the exit code — is what actually exercises the installed bin.
          echo "${OUT}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+' \
            || { echo "::error::feature-forge --version produced no semver output — installed bin is a no-op"; exit 1; }
