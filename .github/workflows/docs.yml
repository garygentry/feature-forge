# .github/workflows/docs.yml — GitHub Pages deploy (project Pages, subpath base)
# Generated by doc-site. Env-driven SITE/BASE_PATH (REQ-CORE-02/DEPLOY-02).
# Toolchain fragment: Node + npm, single-package (docs-site/). `${{ ... }}`
# sequences are GitHub Actions expressions, not generator tokens.
name: docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs-site/**"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install
        working-directory: docs-site

      - name: Docs drift guard
        run: sh setup-docs.sh && npm run docs:check
        working-directory: docs-site

      - name: Build docs site
        run: npm run build
        working-directory: docs-site
        env:
          # Env-driven site/base — consumed by docs-site/astro.config.mjs.
          # Subpath base => assets resolve on the project Pages subpath /<repo>/.
          SITE: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs-site/dist"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
