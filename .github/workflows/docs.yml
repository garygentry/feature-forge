# .github/workflows/docs.yml — GitHub Pages deploy (project Pages, subpath base)
# Generated by doc-site. Env-driven SITE/BASE_PATH (REQ-CORE-02/DEPLOY-02).
# Toolchain fragment: Node + npm, single-package (docs-site/). `${{ ... }}`
# sequences are GitHub Actions expressions, not generator tokens.
name: docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs-site/**"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm install
        working-directory: docs-site

      - name: Docs drift guard
        run: sh setup-docs.sh && npm run docs:check
        working-directory: docs-site

      - name: Build docs site
        run: npm run build
        working-directory: docs-site
        env:
          # Env-driven site/base — consumed by docs-site/astro.config.mjs.
          # Subpath base => assets resolve on the project Pages subpath /<repo>/.
          SITE: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "docs-site/dist"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Safety net: the deploy is a single API round-trip; if it wedges, fail fast
    # rather than burn the 6h default and hold the `pages` concurrency group.
    timeout-minutes: 10
    environment:
      name: github-pages
      # Coalesce: whichever attempt (first or retry) produced the deployment.
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # The Pages backend intermittently rejects the create-deployment call with
      # "Deployment failed, try again later." (a GitHub-side transient, not a
      # content/config error). Don't fail the run on the first such flake — retry
      # once. First attempt is non-fatal; the retry only runs if it failed.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 15

      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
