name: npm Publish (manual)

# Publishes the cross-agent installer (installer/, @garygentry/feature-forge) to npm
# via npm Trusted Publishing (OIDC) — no token, no secret. Manual-only, outside the
# PR gate. Requires a Trusted Publisher configured on the npm package pointing at this
# repo + this workflow filename. The installer's `prepack` builds dist/ and bundles
# the repo-root adapters/ into the package before publish.

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: "npm dist-tag to publish under"
        required: false
        default: "latest"

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: installer
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      # Pre-publish gate (G1): the package bundles the repo-root adapters/ via the
      # installer's `prepack`, so a canon↔adapters drift or a version desync would
      # publish stale content under a fresh version. Fail before publishing. Runs
      # from the repo root (this job otherwise defaults to installer/).
      - name: Pre-publish gate (adapters not drifted + versions synced)
        working-directory: ${{ github.workspace }}
        run: |
          python3 -m venv .venv-adapters
          .venv-adapters/bin/python3 -m pip install -q -r scripts/requirements-adapters.txt
          .venv-adapters/bin/python3 scripts/build-adapters.py --check
          python3 scripts/check-version-sync.py
      # Trusted publishing (OIDC) requires npm >= 11.5.1; setup-node ships npm 10.x.
      - run: npm install -g npm@latest
      - run: npm ci
      # OIDC: no token env — npm detects the trusted-publisher OIDC context in Actions.
      # `npm publish` runs the `prepack` hook (build + bundle adapters) automatically.
      - run: npm publish --access public --provenance --tag "$DIST_TAG"
        env:
          DIST_TAG: ${{ inputs.dist-tag }}
